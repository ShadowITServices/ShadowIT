  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Brand colours ── */
      --clr-electric-indigo: #6D00E6;
      --clr-electric-purple: #BE00FF;
      --clr-purpureus:       #AF2BBF;
      --clr-russian-violet:  #281549;

      /* ── Background: deeper violet-grey mid-tone ── */
      --clr-bg-start: #EDE9F5;   /* soft violet-grey, reduces luminance gap */
      --clr-bg-end:   #E4DFF0;   /* slightly deeper lavender wash */

      /* ── Brand gradient: toned-down for text (desaturated + darkened) ── */
      --grad-brand: linear-gradient(135deg, #5500B8 0%, #9500CC 100%);

      /* ── Semantic text tokens ── */
      --clr-text:       #2e2545;  /* deep violet-neutral — strong but not harsh */
      --clr-text-muted: #6b5f85;  /* muted purple-grey, lifts off deeper bg */

      --font-heading: 'Raleway', sans-serif;
      --font-body:    'Nunito Sans', sans-serif;
    }

    /* ── Reusable gradient-text utility ─────────────────────
       Apply to any element that needs the brand gradient fill.
       Works on text via background-clip, and on SVG via fill/stroke
       by wrapping in a container styled with this class.          */
    .grad-text {
      background: var(--grad-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      /* Fallback for browsers that don't support background-clip:text */
      color: var(--clr-electric-indigo);
    }

    html { height: 100%; }

    body {
      font-family: var(--font-body);
      /*
       * Warm white two-tone background:
       * #FAFAFA (top-left) → #F2F0F7 (bottom-right, barely-there violet blush)
       * Subtle diagonal direction echoes the brand gradient angle.
       */
      background: linear-gradient(135deg, var(--clr-bg-start) 0%, var(--clr-bg-end) 100%);
      color: var(--clr-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* Soft atmospheric radial tints — keep the page airy, not flat */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 60%, rgba(109, 0, 230, 0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 88% 12%, rgba(190, 0, 255, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Decorative ghost triangle — echoes the logo mark */
    body::after {
      content: '';
      position: absolute;
      width: min(60vw, 500px);
      height: min(60vw, 500px);
      bottom: -18%;
      right: -8%;
      border: 1.5px solid rgba(109, 0, 230, 0.07);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Content wrapper ──────────────────────────────────── */
    .content {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 100%;
      animation: fadeUp 0.75s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ─────────────────────────────────────────────── */
    .logo {
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo img {
      /*
       * On the warm white background the full-colour logo renders naturally —
       * no filter needed. The coloured mark and dark wordmark both read clearly.
       */
      width: clamp(200px, 60vw, 340px);
      height: auto;
      display: block;
    }

    /* ── Label tag — gradient border + gradient text ─────── */
    .label-tag {
      display: inline-block;
      font-family: var(--font-heading);
      font-size: 0.70rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      padding: 6px 18px;
      border-radius: 50px;
      /*
       * Gradient border trick: background is the gradient,
       * padded inward with a white inset to reveal only the border ring.
       */
      background:
        linear-gradient(#EDE9F5, #EDE9F5) padding-box,
        var(--grad-brand) border-box;
      border: 1.5px solid transparent;
      /* Gradient text */
      background-color: transparent; /* override for older engines */
    }
    /* Gradient fill on the label text via a child span */
    .label-tag span {
      background: var(--grad-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: var(--clr-electric-indigo); /* fallback */
    }

    /* ── Heading — gradient fill ──────────────────────────── */
    h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
      /* Brand gradient text */
      background: var(--grad-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: var(--clr-electric-indigo); /* fallback */
    }

    /* ── Lead copy ────────────────────────────────────────── */
    .lead {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--clr-text);
      margin-bottom: 36px;
      max-width: 460px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Divider — brand gradient bar ────────────────────── */
    .divider {
      width: 56px;
      height: 3px;
      border-radius: 2px;
      background: var(--grad-brand);
      margin: 0 auto 36px;
    }

    /* ── Contact row ──────────────────────────────────────── */
    .contact-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--clr-text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    /* Icon: gradient via SVG linearGradient defined inline in markup */
    .contact-item svg { flex-shrink: 0; }

    .contact-item:hover,
    .contact-item:focus-visible {
      color: var(--clr-electric-indigo);
      outline: 2px solid rgba(109, 0, 230, 0.25);
      outline-offset: 4px;
      border-radius: 2px;
    }
    /* Gradient text on hover */
    .contact-item:hover .contact-label,
    .contact-item:focus-visible .contact-label {
      background: var(--grad-brand);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Social icon button ───────────────────────────────── */
    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      /* Gradient border at rest */
      background:
        linear-gradient(#EDE9F5, #E4DFF0) padding-box,
        var(--grad-brand) border-box;
      border: 1.5px solid transparent;
      color: var(--clr-electric-indigo);
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .social-link:hover,
    .social-link:focus-visible {
      background:
        var(--grad-brand) padding-box,
        var(--grad-brand) border-box;
      color: #ffffff;
      outline: none;
      /* Icon colour overridden by SVG fill inside */
    }
    .social-link:hover svg,
    .social-link:focus-visible svg {
      fill: #ffffff;
    }

    /* ── Footer note ──────────────────────────────────────── */
    .footer-note {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.73rem;
      color: var(--clr-text-muted);
      z-index: 1;
      white-space: nowrap;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 480px) {
      .logo img { width: clamp(160px, 72vw, 260px); }
      h1 { font-size: 1.7rem; }
      .contact-row { flex-direction: column; align-items: center; gap: 12px; }
    }
  </style>
</head>
